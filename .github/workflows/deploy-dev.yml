name: Deploy to Dev

on:
  push:
    branches: [main]
    paths:
      - "pipelines/**"
      - "agents/**"

permissions:
  id-token: write
  contents: read

jobs:
  package-and-deploy:
    name: Package & Deploy to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Package pipelines
        run: |
          ARTIFACT_VERSION="${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S)"
          echo "ARTIFACT_VERSION=${ARTIFACT_VERSION}" >> "$GITHUB_ENV"
          cd pipelines && zip -r "../pipelines-${ARTIFACT_VERSION}.zip" . -x '*.pyc' '__pycache__/*'
          cd ../agents && zip -r "../agents-${ARTIFACT_VERSION}.zip" . -x '*.pyc' '__pycache__/*'

      - name: Upload artifacts to S3
        run: |
          aws s3 cp "pipelines-${ARTIFACT_VERSION}.zip" \
            "s3://${{ vars.ARTIFACTS_BUCKET }}/dev/pipelines/${ARTIFACT_VERSION}/pipelines.zip"
          aws s3 cp "agents-${ARTIFACT_VERSION}.zip" \
            "s3://${{ vars.ARTIFACTS_BUCKET }}/dev/agents/${ARTIFACT_VERSION}/agents.zip"
          echo "${ARTIFACT_VERSION}" | aws s3 cp - \
            "s3://${{ vars.ARTIFACTS_BUCKET }}/dev/latest-version.txt"

      - name: Run integration test with synthetic data
        run: |
          pip install -r requirements-dev.txt
          pytest tests/integration/ -v --tb=short \
            -k "test_end_to_end" \
            --junitxml=reports/integration-results.xml
        env:
          ETL_ENV: dev
          MOCK_MODE: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/integration-results.xml
